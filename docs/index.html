<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hamster Simulator – Die Programmier-Schule ohne Namen</title>
  <style>
    :root {
      --muted-gold: #c5a065;
      --burnt-orange: #cc5500;

      --bg-main: #1a2c3e;
      --bg-panel: #213549;
      --bg-subtle: #273c52;
      --bg-elevated: #2b4259;
      --text-main: #ffffff;
      --text-muted: #d7dfeb;
      --line-color: var(--muted-gold);
      --accent-color: var(--burnt-orange);
      --accent-soft: #e58d53;
      --accent-bg: #4e3320;
      --button-bg: #2a4056;
      --button-bg-hover: #324b64;
      --success-bg: #204534;
      --success-border: #7fc79f;
      --danger-bg: #5a2d2f;
      --danger-border: #e8a2a2;
      --splitter-hover: rgba(197, 160, 101, .16);
      --splitter-dragging: rgba(204, 85, 0, .2);
      --shadow-color: rgba(0, 0, 0, .45);
    }

    body[data-theme='light'] {
      --bg-main: #f9f7f4;
      --bg-panel: #ffffff;
      --bg-subtle: #f2efe9;
      --bg-elevated: #ece7df;
      --text-main: #1a2c3e;
      --text-muted: #3f4d5c;
      --line-color: var(--muted-gold);
      --accent-color: var(--burnt-orange);
      --accent-soft: #cc5500;
      --accent-bg: #f5e6db;
      --button-bg: #f0ebe4;
      --button-bg-hover: #e6ddd2;
      --success-bg: #dceee2;
      --success-border: #3f8b62;
      --danger-bg: #f4e0df;
      --danger-border: #b75f5f;
      --splitter-hover: rgba(197, 160, 101, .18);
      --splitter-dragging: rgba(204, 85, 0, .22);
      --shadow-color: rgba(26, 44, 62, .22);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Linux Libertine', 'LinLibertine', 'Times New Roman', serif;
      background: var(--bg-main);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    body[data-theme='light'] {
      font-family: 'Linux Biolinum', 'LinBiolinum', 'Segoe UI', sans-serif;
    }

    /* ── header ─────────────────────────────────────────── */
    header {
      background: var(--bg-panel);
      padding: .6rem 1rem;
      display: flex;
      align-items: center;
      gap: .8rem;
      border-bottom: 1px solid var(--line-color);
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; color: var(--accent-color); }
    header .badge {
      font-size: .7rem; background: var(--bg-elevated); padding: .2rem .5rem;
      border-radius: 4px; color: var(--line-color);
      border: 1px solid var(--line-color);
    }

    .theme-toggle {
      margin-left: auto;
      border-color: var(--line-color);
      color: var(--line-color);
      background: var(--button-bg);
      min-width: 112px;
      font-weight: 600;
    }
    .theme-toggle:hover {
      background: var(--button-bg-hover);
      color: var(--accent-color);
      border-color: var(--accent-color);
    }

    /* ── main layout ─────────────────────────────────────── */
    main {
      --left-pane-width: calc((100% - 8px) / 2);
      --right-top-height: 68%;
      display: grid;
      grid-template-columns: var(--left-pane-width) 8px minmax(280px, 1fr);
      grid-template-rows: var(--right-top-height) 8px minmax(140px, 1fr);
      gap: 0;
      padding: .5rem;
      flex: 1;
      overflow: hidden;
    }

    /* ── simulation canvas ───────────────────────────────── */
    #sim-wrapper {
      grid-row: 1 / 2;
      grid-column: 3 / 4;
      background: var(--bg-panel);
      border: 1px solid var(--line-color);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      overflow: hidden;
      padding: 0;
    }
    #sim-canvas-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: .5rem;
    }
    canvas { box-shadow: 0 4px 20px var(--shadow-color); border-radius: 2px; }

    /* ── editor ──────────────────────────────────────────── */
    #editor-wrapper {
      grid-row: 1 / 4;
      grid-column: 1 / 2;
      background: var(--bg-panel);
      border: 1px solid var(--line-color);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #editor-content {
      --files-pane-width: calc((100% - 58px - 8px) / 4);
      flex: 1;
      display: grid;
      grid-template-columns: 58px minmax(160px, var(--files-pane-width)) 8px minmax(200px, 1fr);
      min-height: 0;
      overflow: hidden;
    }

    #editor {
      width: 100%;
      height: 100%;
      min-width: 0;
      font-family: 'Consolas', 'Fira Code', monospace;
      font-size: .88rem;
      background: var(--bg-main);
      color: var(--text-main);
      border: none;
      resize: none;
      padding: .8rem;
      outline: none;
      line-height: 1.55;
    }

    #editor-activity-bar {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-subtle) 100%);
      border-right: 1px solid var(--line-color);
      padding: .45rem .3rem;
      display: flex;
      flex-direction: column;
      gap: .35rem;
      align-items: stretch;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .activity-btn {
      min-height: 44px;
      padding: .35rem .2rem;
      border: 1px solid var(--line-color);
      border-radius: 6px;
      background: var(--button-bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: .15rem;
      font-size: .62rem;
      line-height: 1.1;
      letter-spacing: .01em;
      text-align: center;
    }

    .activity-btn:hover:not(:disabled) {
      background: var(--button-bg-hover);
      border-color: var(--accent-color);
      color: var(--accent-color);
    }

    .activity-btn .icon {
      font-size: .88rem;
      line-height: 1;
      color: var(--line-color);
    }

    .activity-btn.primary {
      background: var(--bg-elevated);
      border-color: var(--accent-color);
      color: var(--accent-color);
    }

    .activity-btn.terrain {
      background: var(--accent-bg);
      border-color: var(--accent-color);
      color: var(--accent-soft);
    }

    .activity-btn.success {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-border);
    }

    .activity-btn.danger {
      background: var(--danger-bg);
      border-color: var(--danger-border);
      color: var(--danger-border);
    }
    #sources-panel {
      min-height: 0;
      background: var(--bg-subtle);
      border-right: 1px solid var(--line-color);
      display: flex;
      flex-direction: column;
      font-size: .78rem;
      overflow: auto;
    }
    #sources-panel .explorer-title {
      padding: .45rem .7rem;
      font-size: .68rem;
      color: var(--text-muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line-color);
      background: var(--bg-elevated);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    #sources-folder {
      color: var(--text-main);
      padding: .45rem .7rem;
      border-bottom: 1px solid var(--line-color);
      background: var(--bg-panel);
      word-break: break-word;
    }
    #sources-list {
      list-style: none;
      display: grid;
      gap: .1rem;
      padding: .35rem .35rem .5rem .45rem;
    }
    #sources-list .tree-node {
      list-style: none;
    }
    #sources-list .tree-row {
      font-family: 'Consolas', 'Fira Code', monospace;
      color: var(--text-main);
      min-height: 22px;
      display: flex;
      align-items: center;
      gap: .35rem;
      padding: .1rem .3rem;
      border-radius: 4px;
    }
    #sources-list .tree-row:hover {
      background: var(--bg-elevated);
    }
    #sources-list .tree-row.active {
      background: var(--bg-elevated);
      box-shadow: inset 0 0 0 1px var(--accent-color);
    }
    #sources-list .tree-row.interactive {
      cursor: pointer;
      user-select: none;
    }
    #sources-list .tree-node.depth-1 > .tree-row { padding-left: .7rem; }
    #sources-list .tree-node.depth-2 > .tree-row { padding-left: 1.25rem; }
    #sources-list .tree-node.depth-3 > .tree-row { padding-left: 1.8rem; }
    #sources-list .tree-node.depth-4 > .tree-row { padding-left: 2.35rem; }
    #sources-list .tree-icon {
      width: 14px;
      text-align: center;
      color: var(--line-color);
      flex-shrink: 0;
    }
    #sources-list .tree-name {
      word-break: break-word;
    }
    #sources-list .tree-node.kind-dir > .tree-row .tree-name { color: #9fc5ff; }
    #sources-list .tree-node.kind-ham > .tree-row .tree-name { color: #a6e3a1; }
    #sources-list .tree-node.kind-ter > .tree-row .tree-name { color: var(--accent-color); }
    #sources-list .tree-node.kind-txt > .tree-row .tree-name { color: #bac2de; }
    #sources-list .tree-children {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    #sources-list .tree-children.collapsed {
      display: none;
    }
    #sources-empty {
      color: var(--text-muted);
      font-style: italic;
      padding: .45rem .7rem;
    }

    /* ── log ─────────────────────────────────────────────── */
    #log-wrapper {
      grid-row: 3 / 4;
      grid-column: 3 / 4;
      background: var(--bg-panel);
      border: 1px solid var(--line-color);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .splitter {
      background: var(--bg-elevated);
      position: relative;
      z-index: 2;
      user-select: none;
      touch-action: none;
    }
    .splitter::after {
      content: '';
      position: absolute;
      inset: 0;
      background: transparent;
      transition: background .15s;
    }
    .splitter:hover::after { background: var(--splitter-hover); }
    .splitter.dragging::after { background: var(--splitter-dragging); }

    #v-splitter {
      grid-row: 1 / 4;
      grid-column: 2 / 3;
      cursor: col-resize;
      border-left: 1px solid var(--line-color);
      border-right: 1px solid var(--line-color);
    }

    #h-splitter {
      grid-row: 2 / 3;
      grid-column: 3 / 4;
      cursor: row-resize;
      border-top: 1px solid var(--line-color);
      border-bottom: 1px solid var(--line-color);
    }

    #files-splitter {
      cursor: col-resize;
      border-left: 1px solid var(--line-color);
      border-right: 1px solid var(--line-color);
    }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: .4rem .8rem;
      font-family: monospace;
      font-size: .78rem;
      line-height: 1.5;
    }
    #log div        { color: #a6e3a1; }
    #log .log-error { color: #f38ba8; }
    #log .log-sys   { color: #89b4fa; }

    /* ── buttons ─────────────────────────────────────────── */
    button {
      padding: .35rem .75rem;
      border: 1px solid var(--line-color);
      border-radius: 4px;
      background: var(--button-bg);
      color: var(--text-main);
      cursor: pointer;
      font-size: .82rem;
      transition: background .15s;
    }
    button:hover   { background: var(--button-bg-hover); }
    button.primary { background: var(--accent-color); border-color: var(--accent-color); color: #fff; }
    button.primary:hover { background: #a84500; }
    button.success { background: var(--success-bg); border-color: var(--success-border); color: var(--success-border); }
    button.success:hover { filter: brightness(.95); }
    button.danger  { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-border); }
    button:disabled { opacity: .4; cursor: default; }

    button.terrain-accent {
      background: var(--accent-bg);
      border-color: var(--accent-color);
      color: var(--accent-soft);
    }
    button.terrain-accent:hover {
      filter: brightness(.96);
    }

    /* ── toolbar ─────────────────────────────────────────── */
    #toolbar {
      display: flex;
      gap: .4rem;
      padding: .4rem .6rem;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--line-color);
      flex-wrap: wrap;
      align-items: center;
      flex-shrink: 0;
      width: 100%;
    }
    #toolbar label { font-size: .8rem; color: var(--text-muted); }
    .tool-group { display: flex; align-items: center; gap: .3rem; flex-wrap: wrap; }
    .tool-button {
      background: var(--button-bg);
      border: 1px solid var(--line-color);
      padding: .3rem .6rem;
      font-size: .75rem;
    }
    .tool-button.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
    #corn-amount { width: 56px; background: var(--bg-main); color: var(--text-main); border: 1px solid var(--line-color); border-radius: 4px; padding: .2rem .3rem; }
    #hover-info { font-size: .75rem; color: var(--text-muted); min-width: 180px; }
    #terrain-size  { background: var(--bg-main); color: var(--text-main); border: 1px solid var(--line-color);
                     padding: .2rem .4rem; border-radius: 4px; width: 50px; font-size: .82rem; }
    #speed-range   { width: 90px; accent-color: var(--accent-color); }
    #status        { margin-left: auto; font-size: .78rem; color: var(--text-muted); }

    .panel-title { padding: .4rem .8rem; font-size: .8rem; color: var(--accent-color);
                   background: var(--bg-main); border-bottom: 1px solid var(--line-color); }

    /* ── terminal input overlay ──────────────────────────── */
    #terminal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #terminal-overlay.visible { display: flex; }
    #terminal-box {
      background: var(--bg-panel);
      border: 1px solid var(--line-color);
      border-radius: 8px;
      padding: 1.5rem;
      width: 380px;
    }
    #terminal-prompt { margin-bottom: .6rem; color: var(--accent-color); font-size: .9rem; }
    #terminal-input  { width: 100%; background: var(--bg-main); color: var(--text-main);
               border: 1px solid var(--line-color); border-radius: 4px;
                       padding: .4rem; font-family: monospace; }
  </style>
</head>
<body>

<header>
  <h1>🐹 Hamster Simulator</h1>
  <span class="badge">Die Programmier-Schule ohne Namen</span>
  <button id="btn-theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">Light Theme</button>
  <span id="loading-msg" style="font-size:.8rem;color:#f38ba8">Loading engine…</span>
</header>

<main>
  <section id="editor-wrapper">
    <div id="editor-content">
      <div id="editor-activity-bar" aria-label="Program actions">
        <button id="btn-add-file" class="activity-btn" title="Add Program (.ham)"><span>Add Program</span></button>
        <button id="btn-add-terrain-file" class="activity-btn terrain" title="Add Terrain (.ter)"><span>Add Terrain</span></button>
        <button id="btn-run" class="activity-btn primary success"><span class="icon">▶</span><span>Run</span></button>
        <button id="btn-step" class="activity-btn primary"><span class="icon">⏭</span><span>Step</span></button>
        <button id="btn-stop" class="activity-btn danger" disabled><span class="icon">⏹</span><span>Stop</span></button>
        <button id="btn-reset" class="activity-btn"><span class="icon">↺</span><span>Reset</span></button>
        <button id="btn-load-folder" class="activity-btn"><span class="icon">🗀</span><span>Folder</span></button>
        <button id="btn-export-program" class="activity-btn"><span class="icon">💾</span><span>Save</span></button>
      </div>

      <div id="sources-panel" aria-live="polite">
        <div class="explorer-title">Explorer</div>
        <div id="sources-folder">Folder: none</div>
        <ul id="sources-list"></ul>
        <div id="sources-empty">No source files loaded yet.</div>
      </div>

      <div id="files-splitter" class="splitter" role="separator" aria-label="Resize files and program"></div>

      <textarea id="editor" spellcheck="false">// Example hamster program in classic .ham syntax
void main() {
  while (vornFrei()) {
    if (kornDa()) {
      nimm();
    }
    vor();
  }
  linksUm();
  linksUm();
}</textarea>
    </div>
  </section>

  <div id="v-splitter" class="splitter" role="separator" aria-label="Resize editor and simulation"></div>

  <section id="sim-wrapper">
    <div id="toolbar">
      <label>W <input id="ter-w" type="number" class="terrain-size" value="10" min="1" max="30" style="width:50px;background:var(--bg-main);color:var(--text-main);border:1px solid var(--line-color);padding:.2rem .4rem;border-radius:4px;font-size:.82rem;"></label>
      <label>H <input id="ter-h" type="number" class="terrain-size" value="8"  min="1" max="20" style="width:50px;background:var(--bg-main);color:var(--text-main);border:1px solid var(--line-color);padding:.2rem .4rem;border-radius:4px;font-size:.82rem;"></label>
      <button id="btn-new" class="terrain-accent">New Terrain</button>
      <label style="margin-left:.5rem">Speed <input id="speed-range" type="range" min="50" max="1000" value="400" step="50"></label>
      <div class="tool-group" style="margin-left:.5rem">
        <span style="font-size:.75rem;color:var(--text-muted);margin-right:.2rem">Edit</span>
        <button class="tool-button active" data-tool="wall">Wall</button>
        <button class="tool-button" data-tool="erase">Erase</button>
        <button class="tool-button" data-tool="corn">Corn</button>
        <button class="tool-button" data-tool="hamster">Move</button>
        <button class="tool-button" data-tool="rotate">Rotate</button>
        <label style="font-size:.75rem;color:var(--text-muted);display:flex;align-items:center;gap:.2rem">Corn
          <input id="corn-amount" type="number" min="0" value="1">
        </label>
        <span id="hover-info">Row –, Col –</span>
      </div>
      <span id="status">Ready</span>
    </div>
    <div id="sim-canvas-wrap">
      <canvas id="sim-canvas"></canvas>
    </div>
  </section>

  <div id="h-splitter" class="splitter" role="separator" aria-label="Resize simulation and execution log"></div>

  <section id="log-wrapper">
    <div class="panel-title">📋 Execution Log</div>
    <div id="log"></div>
  </section>
</main>

<!-- Terminal input overlay (shown when a program calls readInt/readString) -->
<div id="terminal-overlay">
  <div id="terminal-box">
    <div id="terminal-prompt"></div>
    <input id="terminal-input" type="text" placeholder="Type your answer…" />
    <div style="margin-top:.8rem;display:flex;gap:.5rem;justify-content:flex-end">
      <button id="terminal-submit" class="primary">Submit</button>
    </div>
  </div>
</div>

<script type="module">
/*
 * IMPORTANT: This script block runs after TeaVM has compiled the Java engine.
 * During development without a build, replace the import path with your
 * TeaVM output file.  After `mvn package` the engine lands in:
 *   target/<artifact>/js/hamster-engine.js
 */
import {
  engine,
  initCanvas, render,
  initLog, appendLog, clearLog,
  compileProgram, stepProgram, runProgram, stopProgram, abortProgram,
  setStepCallback, hasPendingProgram, terrainToTer
} from './hamster-ui.js';
import JSZip from './assets/vendor/jszip.esm.js';

// ─── DOM refs ────────────────────────────────────────────────
const canvas       = document.getElementById('sim-canvas');
const logEl        = document.getElementById('log');
const statusEl     = document.getElementById('status');
const loadingMsg   = document.getElementById('loading-msg');
const editor       = document.getElementById('editor');
const overlay      = document.getElementById('terminal-overlay');
const termPrompt   = document.getElementById('terminal-prompt');
const termInput    = document.getElementById('terminal-input');
const termSubmit   = document.getElementById('terminal-submit');

const btnNew       = document.getElementById('btn-new');
const btnAddFile   = document.getElementById('btn-add-file');
const btnAddTerrainFile = document.getElementById('btn-add-terrain-file');
const btnRun       = document.getElementById('btn-run');
const btnStep      = document.getElementById('btn-step');
const btnStop      = document.getElementById('btn-stop');
const btnReset     = document.getElementById('btn-reset');
const btnLoadFolder = document.getElementById('btn-load-folder');
const btnExportProgram = document.getElementById('btn-export-program');
const btnThemeToggle = document.getElementById('btn-theme-toggle');
const speedRange   = document.getElementById('speed-range');
const terW         = document.getElementById('ter-w');
const terH         = document.getElementById('ter-h');
const toolButtons  = document.querySelectorAll('[data-tool]');
const cornInput    = document.getElementById('corn-amount');
const hoverInfo    = document.getElementById('hover-info');
const sourcesFolderEl = document.getElementById('sources-folder');
const sourcesListEl = document.getElementById('sources-list');
const sourcesEmptyEl = document.getElementById('sources-empty');
const editorContent = document.getElementById('editor-content');
const mainLayout   = document.querySelector('main');
const vSplitter    = document.getElementById('v-splitter');
const hSplitter    = document.getElementById('h-splitter');
const filesSplitter = document.getElementById('files-splitter');

const THEME_STORAGE_KEY = 'hamster-ui-theme';

function getPreferredTheme() {
  const saved = window.localStorage.getItem(THEME_STORAGE_KEY);
  if (saved === 'dark' || saved === 'light') return saved;
  return 'dark';
}

function updateThemeToggleLabel(theme) {
  if (!btnThemeToggle) return;
  const nextTheme = theme === 'dark' ? 'light' : 'dark';
  btnThemeToggle.textContent = nextTheme === 'dark' ? 'Dark Theme' : 'Light Theme';
  btnThemeToggle.setAttribute('aria-label', `Switch to ${nextTheme} theme`);
}

function applyTheme(theme, persist = true) {
  const normalized = theme === 'light' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', normalized);
  updateThemeToggleLabel(normalized);
  if (persist) {
    window.localStorage.setItem(THEME_STORAGE_KEY, normalized);
  }
}

btnThemeToggle?.addEventListener('click', () => {
  const current = document.body.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  applyTheme(next);
});

applyTheme(getPreferredTheme(), false);

const fallbackDirectoryInput = document.createElement('input');
fallbackDirectoryInput.type = 'file';
fallbackDirectoryInput.multiple = true;
fallbackDirectoryInput.setAttribute('webkitdirectory', '');

let currentState   = null;
let currentTool    = 'wall';
let isDragging     = false;
let lastPaintCell  = null;
let currentProgramFilename = 'program.ham';
let loadedProgramFolder = '';
let loadedProgramFolderHandle = null;
let loadedProgramFiles = [];
let loadedCompanionPrograms = [];
let loadedHamPrograms = [];
let loadedTerrainFiles = [];
let selectedProgramPath = '';
let selectedTerrainPath = '';
let resetProgramText = '';
let activeTerminalPrompt = null;
let renderedLogCount = 0;
const collapsedExplorerDirs = new Set();

// ─── init canvas / log ───────────────────────────────────────
initCanvas(canvas);
initLog(logEl);

const draw = state => {
  if (!state) return;
  currentState = state;
  render(state);
};

// ─── step callback: rerender after every engine step ─────────
setStepCallback(state => {
  draw(state);
  const entries = Array.isArray(state?.log) ? state.log : [];
  if (entries.length < renderedLogCount) {
    renderedLogCount = 0;
  }
  const newEntries = entries.slice(renderedLogCount);
  if (newEntries.length > 0) {
    appendLog(newEntries);
    renderedLogCount = entries.length;
  }
  checkTerminal(state);
  setStatus(state.state === 2 ? 'Finished' : 'Running');
});

// ─── terminal overlay ────────────────────────────────────────
function checkTerminal(state) {
  if (!state?.terminal?.needsInput) {
    activeTerminalPrompt = null;
    overlay.classList.remove('visible');
    return;
  }

  const prompt = state.terminal.prompt || 'Input required:';
  const isNewPrompt = prompt !== activeTerminalPrompt;

  if (isNewPrompt || !overlay.classList.contains('visible')) {
    termPrompt.textContent = prompt;
    termInput.value = '';
    activeTerminalPrompt = prompt;
    overlay.classList.add('visible');
    termInput.focus();
  }
}

termSubmit.addEventListener('click', () => {
    engine.provideInput(termInput.value);
  activeTerminalPrompt = null;
    overlay.classList.remove('visible');
});
termInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') termSubmit.click();
});

// ─── engine boot (triggered after module loads) ───────────────
try {
    const initState = engine.init(
        parseInt(terW.value, 10),
        parseInt(terH.value, 10)
    );
    draw(initState);
    loadingMsg.style.display = 'none';

} catch(e) {
    loadingMsg.textContent = 'Engine failed to load – see console';

// ─── program file workflow ─────────────────────────────────────────
btnLoadFolder?.addEventListener('click', async () => {
  try {
    if (typeof window.showDirectoryPicker === 'function') {
      const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      await loadProgramFromDirectory(dirHandle);
      return;
    }

    const pickedFiles = await pickFilesFromLegacyDirectoryInput();
    if (pickedFiles.length > 0) {
      loadedProgramFolderHandle = null;
      await loadProgramFromFiles(pickedFiles, {
        fromFolder: true,
        folderName: getTopLevelFolderNameFromRelativePaths(pickedFiles.map(file => file.webkitRelativePath || file.name)),
        folderHandle: null,
      });
      return;
    }

    const zipFile = await pickZipArchive();
    if (!zipFile) {
      setStatus('Folder import cancelled');
      return;
    }
    await loadProgramFromZip(zipFile);
  } catch (err) {
    if (err?.name === 'AbortError') {
      setStatus('Folder import cancelled');
      return;
    }
    console.error(err);
    setStatus(err.message || 'Could not load folder');
  }
});

btnAddFile?.addEventListener('click', async () => {
  if (!loadedProgramFolderHandle || typeof loadedProgramFolderHandle.getFileHandle !== 'function') {
    setStatus('Open a folder first to add files');
    return;
  }

  const requestedName = window.prompt('New file name (.ham):', 'new-program.ham');
  if (requestedName == null) {
    setStatus('Create file cancelled');
    return;
  }

  const trimmedName = String(requestedName || '').trim();
  if (!trimmedName) {
    setStatus('File name is required');
    return;
  }

  const filename = ensureHamExtension(trimmedName.replace(/[\\/]+/g, ''));
  if (!filename) {
    setStatus('Invalid file name');
    return;
  }

  if (loadedHamPrograms.some(file => normalizeProgramPath(file.path) === normalizeProgramPath(filename))) {
    setStatus(`File already exists in explorer: ${filename}`);
    return;
  }

  try {
    const fileHandle = await loadedProgramFolderHandle.getFileHandle(filename, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write('');
    await writable.close();

    const normalizedPath = normalizeProgramPath(filename);
    loadedHamPrograms.push({
      path: normalizedPath,
      fileHandle,
      text: '',
    });
    loadedProgramFiles.push({ path: normalizedPath });
    setActiveProgramByPath(normalizedPath, { updateStatus: false });
    resetProgramText = editor.value ?? '';
    setStatus(`Created file: ${filename}`);
  } catch (err) {
    if (err?.name === 'AbortError') {
      setStatus('Create file cancelled');
      return;
    }
    console.error(err);
    setStatus(err?.message || 'Could not create file in opened folder');
  }
});

btnAddTerrainFile?.addEventListener('click', async () => {
  if (!loadedProgramFolderHandle || typeof loadedProgramFolderHandle.getFileHandle !== 'function') {
    setStatus('Open a folder first to add files');
    return;
  }

  const requestedName = window.prompt('New terrain file name (.ter):', 'new-terrain.ter');
  if (requestedName == null) {
    setStatus('Create terrain file cancelled');
    return;
  }

  const trimmedName = String(requestedName || '').trim();
  if (!trimmedName) {
    setStatus('File name is required');
    return;
  }

  const filename = ensureTerExtension(trimmedName.replace(/[\\/]+/g, ''));
  if (!filename) {
    setStatus('Invalid file name');
    return;
  }

  if (loadedTerrainFiles.some(file => normalizeProgramPath(file.path) === normalizeProgramPath(filename))) {
    setStatus(`Terrain file already exists in explorer: ${filename}`);
    return;
  }

  try {
    const terText = currentState?.terrain ? terrainToTer(currentState) : '';
    const fileHandle = await loadedProgramFolderHandle.getFileHandle(filename, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(terText);
    await writable.close();

    const normalizedPath = normalizeProgramPath(filename);
    loadedTerrainFiles.push({
      path: normalizedPath,
      fileHandle,
      text: terText,
    });
    if (!loadedProgramFiles.some(entry => normalizeProgramPath(entry?.path || '') === normalizedPath)) {
      loadedProgramFiles.push({ path: normalizedPath });
    }
    loadTerrainByPath(normalizedPath, { updateStatus: false });
    setStatus(`Created terrain file: ${filename}`);
  } catch (err) {
    if (err?.name === 'AbortError') {
      setStatus('Create terrain file cancelled');
      return;
    }
    console.error(err);
    setStatus(err?.message || 'Could not create terrain file in opened folder');
  }
});

btnExportProgram?.addEventListener('click', async () => {
  persistActiveEditorProgramText();
  const activeProgram = Array.isArray(loadedHamPrograms)
    ? loadedHamPrograms.find(file => file.path === selectedProgramPath)
    : null;

  if (activeProgram?.fileHandle && typeof activeProgram.fileHandle.createWritable === 'function') {
    try {
      const writable = await activeProgram.fileHandle.createWritable();
      await writable.write(String(editor.value ?? ''));
      await writable.close();
      currentProgramFilename = ensureHamExtension(getFilenameFromPath(activeProgram.path) || currentProgramFilename);
      setStatus(`Program saved: ${currentProgramFilename}`);
      return;
    } catch (err) {
      if (err?.name === 'AbortError') {
        setStatus('Save cancelled');
        return;
      }
      console.error(err);
      setStatus(err.message || 'Save failed');
      return;
    }
  }

  const suggested = ensureHamExtension(getFilenameFromPath(selectedProgramPath) || currentProgramFilename || 'program.ham');
  try {
    const result = await saveTextFile(suggested, editor.value ?? '', '.ham');
    if (!result.saved) return;
    currentProgramFilename = ensureHamExtension(result.filename || suggested);
    setStatus(`Program saved: ${currentProgramFilename}`);
  } catch (err) {
    if (err?.name === 'AbortError') {
      setStatus('Save cancelled');
      return;
    }
    console.error(err);
    setStatus(err.message || 'Save failed');
  }
});

// ─── program controls ─────────────────────────────────────────
btnRun.addEventListener('click', () => {
  // If there is a paused program, resume it instead of recompiling.
  if (hasPendingProgram()) {
    setStatus('Running…');
    btnRun.disabled  = true;
    btnStep.disabled = true;
    btnStop.disabled = false;
    runProgram(parseInt(speedRange.value, 10));
    const timer = setInterval(() => {
      if (!hasPendingProgram()) {
            clearInterval(timer);
            btnRun.disabled  = false;
            btnStep.disabled = false;
            btnStop.disabled = true;
            setStatus('Finished');
        }
    }, 200);
    return;
  }

  clearExecutionLog();
    engine.start();
  resetProgramText = editor.value ?? '';

    // Compile the editor content
    const n = compileProgram(buildCompilationSource());
    if (n === 0) { setStatus('No statements to run'); return; }

    setStatus('Running…');
    btnRun.disabled  = true;
    btnStep.disabled = true;
    btnStop.disabled = false;

    runProgram(parseInt(speedRange.value, 10));

    // Re-enable controls when done
    const timer = setInterval(() => {
      if (!hasPendingProgram()) {
            clearInterval(timer);
            btnRun.disabled  = false;
            btnStep.disabled = false;
            btnStop.disabled = true;
            setStatus('Finished');
        }
    }, 200);
});

btnStep.addEventListener('click', () => {
    // First click: compile the script and snapshot the terrain
  if (!hasPendingProgram()) {
        engine.start();
        resetProgramText = editor.value ?? '';
        compileProgram(buildCompilationSource());
        clearExecutionLog();
    }
    const hasMore = stepProgram();
    if (!hasMore) {
        setStatus('Program complete');
        btnStop.disabled = true;
        btnRun.disabled  = false;
    } else {
        btnStop.disabled = false;
        btnRun.disabled  = true;
    }
});

btnStop.addEventListener('click', () => {
    stopProgram();
    btnRun.disabled  = false;
    btnStep.disabled = false;
    btnStop.disabled = true;
    setStatus('Paused');
});

btnReset.addEventListener('click', () => {
    abortProgram();
    const state = engine.reset();
    if (typeof resetProgramText === 'string' && resetProgramText.length > 0) {
      editor.value = resetProgramText;
    }
    overlay.classList.remove('visible');
    termInput.value = '';
  draw(state);
    clearExecutionLog();
    btnRun.disabled  = false;
    btnStep.disabled = false;
    btnStop.disabled = true;
    setStatus('Reset');
});

canvas.addEventListener('mousedown', evt => {

  isDragging = true;
  lastPaintCell = null;
  applyTool(cell);
});

canvas.addEventListener('mousemove', evt => {
  const cell = eventToCell(evt);
  updateHover(cell);
  if (!isDragging) return;
  if (currentTool !== 'rotate' && cell && lastPaintCell && lastPaintCell.x === cell.x && lastPaintCell.y === cell.y) {
    return;
  }
  applyTool(cell);
});

canvas.addEventListener('mouseleave', () => {
  updateHover(null);
  isDragging = false;
  lastPaintCell = null;
});

// ─── helpers ──────────────────────────────────────────────────
function setStatus(msg) {
    statusEl.textContent = msg;
}

function clearExecutionLog() {
  clearLog();
  renderedLogCount = 0;
}

function normalizeProgramPath(path) {
  return String(path || '').trim().replace(/\\+/g, '/').replace(/^\/+|\/+$/g, '');
}

function persistActiveEditorProgramText() {
  if (!selectedProgramPath || !Array.isArray(loadedHamPrograms) || loadedHamPrograms.length === 0) {
    return;
  }
  const index = loadedHamPrograms.findIndex(file => file.path === selectedProgramPath);
  if (index < 0) return;
  loadedHamPrograms[index] = {
    ...loadedHamPrograms[index],
    text: String(editor.value ?? ''),
  };
}

function refreshCompanionPrograms() {
  if (!Array.isArray(loadedHamPrograms) || loadedHamPrograms.length === 0) {
    loadedCompanionPrograms = [];
    return;
  }
  loadedCompanionPrograms = loadedHamPrograms
    .filter(file => file.path !== selectedProgramPath)
    .map(file => ({ path: file.path, text: file.text }));
}

function setActiveProgramByPath(path, options = {}) {
  const normalizedPath = normalizeProgramPath(path);
  if (!normalizedPath || !Array.isArray(loadedHamPrograms) || loadedHamPrograms.length === 0) {
    return false;
  }

  const target = loadedHamPrograms.find(file => file.path === normalizedPath);
  if (!target) return false;

  if (selectedProgramPath && selectedProgramPath !== normalizedPath) {
    persistActiveEditorProgramText();
  }

  selectedProgramPath = normalizedPath;
  editor.value = String(target.text ?? '');
  currentProgramFilename = ensureHamExtension(getFilenameFromPath(target.path) || currentProgramFilename);
  refreshCompanionPrograms();
  updateLoadedSourcesPanel();

  if (options.updateStatus !== false) {
    setStatus(`Active program: ${currentProgramFilename}`);
  }

  return true;
}

function loadTerrainByPath(path, options = {}) {
  const normalizedPath = normalizeProgramPath(path);
  if (!normalizedPath || !Array.isArray(loadedTerrainFiles) || loadedTerrainFiles.length === 0) {
    return false;
  }

  const target = loadedTerrainFiles.find(file => file.path === normalizedPath);
  if (!target) return false;

  try {
    const state = engine.loadTerrain(String(target.text ?? ''));
    draw(state);
    clearExecutionLog();
    selectedTerrainPath = normalizedPath;
    updateLoadedSourcesPanel();
    if (options.updateStatus !== false) {
      setStatus(`Terrain loaded: ${getFilenameFromPath(target.path)}`);
    }
    return true;
  } catch (err) {
    console.error(err);
    if (options.updateStatus !== false) {
      setStatus(err?.message || 'Invalid .ter file');
    }
    return false;
  }
}

function buildCompilationSource() {
  persistActiveEditorProgramText();
  refreshCompanionPrograms();

  const mainSource = editor.value ?? '';
  if (!Array.isArray(loadedCompanionPrograms) || loadedCompanionPrograms.length === 0) {
    return mainSource;
  }

  const companionBlocks = loadedCompanionPrograms
    .map(file => {
      const filePath = String(file?.path || '').trim();
      const text = String(file?.text || '');
      return `\n/* companion file: ${filePath} */\n${text}`;
    })
    .join('');

  return `${mainSource}${companionBlocks}`;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function initResizablePanes() {
  if (!mainLayout || !vSplitter || !hSplitter) return;

  const splitterSize = 8;
  const minLeft = 260;
  const minRight = 300;
  const minTop = 180;
  const minBottom = 130;

  const startDrag = (splitter, onMove) => event => {
    // Ignore non-primary mouse buttons; touch/pen don't set button this way.
    if (event.pointerType === 'mouse' && event.button !== 0) return;
    event.preventDefault();
    splitter.classList.add('dragging');

    const activePointerId = event.pointerId;
    if (typeof splitter.setPointerCapture === 'function') {
      splitter.setPointerCapture(activePointerId);
    }

    const move = e => {
      if (e.pointerId !== activePointerId) return;
      e.preventDefault();
      onMove(e);
    };

    const stop = e => {
      if (e.pointerId !== activePointerId) return;
      splitter.classList.remove('dragging');
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', stop);
      window.removeEventListener('pointercancel', stop);
      if (typeof splitter.releasePointerCapture === 'function') {
        splitter.releasePointerCapture(activePointerId);
      }
    };

    window.addEventListener('pointermove', move, { passive: false });
    window.addEventListener('pointerup', stop);
    window.addEventListener('pointercancel', stop);
  };

  vSplitter.addEventListener('pointerdown', startDrag(vSplitter, e => {
    const rect = mainLayout.getBoundingClientRect();
    const maxLeft = Math.max(minLeft, rect.width - splitterSize - minRight);
    const nextLeft = clamp(e.clientX - rect.left, minLeft, maxLeft);
    mainLayout.style.setProperty('--left-pane-width', `${Math.round(nextLeft)}px`);
  }));

  hSplitter.addEventListener('pointerdown', startDrag(hSplitter, e => {
    const rect = mainLayout.getBoundingClientRect();
    const maxTop = Math.max(minTop, rect.height - splitterSize - minBottom);
    const nextTop = clamp(e.clientY - rect.top, minTop, maxTop);
    mainLayout.style.setProperty('--right-top-height', `${Math.round(nextTop)}px`);
  }));

  if (editorContent && filesSplitter) {
    const activityBarWidth = 58;
    const minFiles = 150;
    const minEditor = 220;
    filesSplitter.addEventListener('pointerdown', startDrag(filesSplitter, e => {
      const rect = editorContent.getBoundingClientRect();
      const leftEdge = rect.left + activityBarWidth;
      const totalResizable = Math.max(0, rect.width - activityBarWidth - splitterSize);
      const maxFiles = Math.max(minFiles, totalResizable - minEditor);
      const nextFiles = clamp(e.clientX - leftEdge, minFiles, maxFiles);
      editorContent.style.setProperty('--files-pane-width', `${Math.round(nextFiles)}px`);
    }));
  }
}

function updateLoadedSourcesPanel() {
  if (btnAddFile) {
    btnAddFile.disabled = !loadedProgramFolderHandle;
  }
  if (btnAddTerrainFile) {
    btnAddTerrainFile.disabled = !loadedProgramFolderHandle;
  }
  if (sourcesFolderEl) {
    sourcesFolderEl.textContent = `Folder: ${loadedProgramFolder || 'none'}`;
  }
  if (!sourcesListEl || !sourcesEmptyEl) return;

  sourcesListEl.innerHTML = '';
  const files = Array.isArray(loadedProgramFiles) ? loadedProgramFiles : [];
  if (files.length === 0) {
    sourcesEmptyEl.style.display = 'block';
    return;
  }

  const root = { dirs: new Map(), files: [] };
  for (const fileEntry of files) {
    const rawPath = typeof fileEntry === 'string' ? fileEntry : (fileEntry?.path || '');
    const normalizedPath = normalizeProgramPath(rawPath);
    if (!normalizedPath) continue;
    const segments = normalizedPath.split('/').filter(Boolean);
    if (segments.length === 0) continue;

    let cursor = root;
    for (let i = 0; i < segments.length - 1; i += 1) {
      const dirName = segments[i];
      if (!cursor.dirs.has(dirName)) {
        cursor.dirs.set(dirName, { dirs: new Map(), files: [] });
      }
      cursor = cursor.dirs.get(dirName);
    }

    const fileName = segments[segments.length - 1];
    cursor.files.push({ name: fileName, fullPath: normalizedPath });
  }

  const makeNode = (name, kind, depth, collapsed = false) => {
    const li = document.createElement('li');
    li.className = `tree-node depth-${Math.min(depth, 4)} kind-${kind}`;

    const row = document.createElement('div');
    row.className = 'tree-row';

    const icon = document.createElement('span');
    icon.className = 'tree-icon';
    icon.textContent = kind === 'dir'
      ? (collapsed ? '▸' : '▾')
      : (kind === 'ham' ? 'H' : (kind === 'ter' ? 'T' : '•'));

    const label = document.createElement('span');
    label.className = 'tree-name';
    label.textContent = name;

    row.appendChild(icon);
    row.appendChild(label);
    li.appendChild(row);
    return { li, row, icon };
  };

  const renderTree = (node, mount, depth, parentPath = '') => {
    const dirNames = Array.from(node.dirs.keys()).sort((a, b) => a.localeCompare(b));
    for (const dirName of dirNames) {
      const child = node.dirs.get(dirName);
      const dirPath = parentPath ? `${parentPath}/${dirName}` : dirName;
      const isCollapsed = collapsedExplorerDirs.has(dirPath);

      const { li, row, icon } = makeNode(dirName, 'dir', depth, isCollapsed);
      row.classList.add('interactive');
      row.setAttribute('role', 'button');
      row.tabIndex = 0;
      row.setAttribute('aria-expanded', String(!isCollapsed));

      const subList = document.createElement('ul');
      subList.className = 'tree-children';
      if (isCollapsed) subList.classList.add('collapsed');
      renderTree(child, subList, depth + 1, dirPath);

      const toggle = () => {
        const willCollapse = !subList.classList.contains('collapsed');
        subList.classList.toggle('collapsed', willCollapse);
        icon.textContent = willCollapse ? '▸' : '▾';
        row.setAttribute('aria-expanded', String(!willCollapse));
        if (willCollapse) {
          collapsedExplorerDirs.add(dirPath);
        } else {
          collapsedExplorerDirs.delete(dirPath);
        }
      };

      row.addEventListener('click', toggle);
      row.addEventListener('keydown', event => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          toggle();
        }
      });

      li.appendChild(subList);
      mount.appendChild(li);
    }

    const sortedFiles = [...node.files].sort((a, b) => a.name.localeCompare(b.name));
    for (const file of sortedFiles) {
      const kind = /\.ham$/i.test(file.name) ? 'ham' : (/\.ter$/i.test(file.name) ? 'ter' : 'txt');
      const { li, row } = makeNode(file.name, kind, depth);
      if (kind === 'ham' || kind === 'ter') {
        row.classList.add('interactive');
        row.setAttribute('role', 'button');
        row.tabIndex = 0;
        const normalizedPath = normalizeProgramPath(file.fullPath);
        if (normalizedPath && (
          (kind === 'ham' && normalizedPath === selectedProgramPath)
          || (kind === 'ter' && normalizedPath === selectedTerrainPath)
        )) {
          row.classList.add('active');
        }

        const activate = () => {
          if (kind === 'ham') {
            setActiveProgramByPath(file.fullPath);
            return;
          }
          loadTerrainByPath(file.fullPath);
        };
        row.addEventListener('click', activate);
        row.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            activate();
          }
        });
      }
      mount.appendChild(li);
    }
  };

  renderTree(root, sourcesListEl, 0);
  sourcesEmptyEl.style.display = 'none';
}

function ensureHamExtension(name) {
  const base = String(name || '').trim() || 'program';
  return /\.ham$/i.test(base) ? base : `${base}.ham`;
}

function ensureTerExtension(name) {
  const base = String(name || '').trim() || 'terrain';
  return /\.ter$/i.test(base) ? base : `${base}.ter`;
}

function getBasenameWithoutExtension(name) {
  const value = String(name || '').trim();
  return value.replace(/\.[^.]+$/u, '');
}

function getFilenameFromPath(path) {
  const value = String(path || '').trim().replace(/\\+/g, '/');
  if (!value) return '';
  const parts = value.split('/');
  return parts[parts.length - 1] || '';
}

function getDirectoryFromPath(path) {
  const value = String(path || '').trim().replace(/\\+/g, '/');
  if (!value) return '';
  const idx = value.lastIndexOf('/');
  if (idx <= 0) return '';
  return value.slice(0, idx);
}

function getCommonPathPrefix(paths) {
  const normalized = paths
    .map(path => String(path || '').trim().replace(/\\+/g, '/').replace(/^\/+|\/+$/g, ''))
    .filter(Boolean);
  if (normalized.length === 0) return '';

  const splitPaths = normalized.map(path => path.split('/'));
  const first = splitPaths[0];
  const common = [];

  for (let i = 0; i < first.length; i += 1) {
    const segment = first[i];
    if (!splitPaths.every(parts => parts[i] === segment)) break;
    common.push(segment);
  }

  return common.join('/');
}

function getTopLevelFolderNameFromRelativePaths(paths) {
  const firstSegment = (paths || [])
    .map(path => String(path || '').trim().replace(/\\+/g, '/'))
    .map(path => path.split('/').filter(Boolean)[0] || '')
    .find(Boolean);
  return firstSegment || 'folder';
}

function pickFilesFromLegacyDirectoryInput() {
  return new Promise(resolve => {
    const hasLegacyDirectorySupport = 'webkitdirectory' in fallbackDirectoryInput;
    if (!hasLegacyDirectorySupport) {
      resolve([]);
      return;
    }

    let settled = false;
    const finish = files => {
      if (settled) return;
      settled = true;
      fallbackDirectoryInput.removeEventListener('change', onChange);
      window.removeEventListener('focus', onWindowFocus);
      resolve(files);
    };

    const onChange = () => {
      const files = Array.from(fallbackDirectoryInput.files || []);
      fallbackDirectoryInput.value = '';
      finish(files);
    };

    const onWindowFocus = () => {
      // Browsers that do not emit a cancel event still regain focus after picker close.
      window.setTimeout(() => {
        if (settled) return;
        const files = Array.from(fallbackDirectoryInput.files || []);
        fallbackDirectoryInput.value = '';
        finish(files);
      }, 200);
    };

    fallbackDirectoryInput.addEventListener('change', onChange, { once: true });
    window.addEventListener('focus', onWindowFocus, { once: true });
    fallbackDirectoryInput.click();
  });
}

function pickZipArchive() {
  return new Promise(resolve => {
    let settled = false;
    const finish = file => {
      if (settled) return;
      settled = true;
      zipProgramInput.removeEventListener('change', onChange);
      window.removeEventListener('focus', onWindowFocus);
      resolve(file || null);
    };

    const onChange = () => {
      const file = (zipProgramInput.files && zipProgramInput.files[0]) || null;
      zipProgramInput.value = '';
      finish(file);
    };

    const onWindowFocus = () => {
      // Resolve even when the picker is cancelled and no change event is fired.
      window.setTimeout(() => {
        if (settled) return;
        const file = (zipProgramInput.files && zipProgramInput.files[0]) || null;
        zipProgramInput.value = '';
        finish(file);
      }, 200);
    };

    zipProgramInput.addEventListener('change', onChange, { once: true });
    window.addEventListener('focus', onWindowFocus, { once: true });
    zipProgramInput.click();
  });
}

async function loadProgramFromZip(zipFile) {
  const buffer = await zipFile.arrayBuffer();
  const zip = await JSZip.loadAsync(buffer);
  const zipEntries = [];

  zip.forEach((relativePath, entry) => {
    const normalizedPath = String(relativePath || '').replace(/\\+/g, '/');
    if (!normalizedPath || entry.dir) return;
    if (normalizedPath.startsWith('__MACOSX/')) return;
    if (!/\.(ham|ter)$/i.test(normalizedPath)) return;
    zipEntries.push({ path: normalizedPath, entry });
  });

  if (zipEntries.length === 0) {
    throw new Error('No .ham or .ter files found in ZIP archive');
  }

  const files = await Promise.all(zipEntries.map(async item => {
    const text = await item.entry.async('string');
    const filename = getFilenameFromPath(item.path) || 'program.ham';
    const file = new File([text], filename, { type: 'text/plain' });
    return { file, path: item.path };
  }));

  loadedProgramFolderHandle = null;
  const zipName = getBasenameWithoutExtension(zipFile.name || 'archive') || 'archive';
  await loadProgramFromFiles(files, {
    fromFolder: true,
    folderName: zipName,
    folderHandle: null,
  });
}

function resolveLoadedFolderPath(fileEntries, options = {}) {
  if (typeof options.folderPath === 'string' && options.folderPath.trim().length > 0) {
    return options.folderPath.trim().replace(/\\+/g, '/');
  }

  // Prefer native file paths when available (desktop wrappers / specific environments).
  const nativeDirectories = fileEntries
    .map(entry => getDirectoryFromPath(entry?.nativePath || ''))
    .filter(Boolean);
  if (nativeDirectories.length > 0) {
    const commonNative = getCommonPathPrefix(nativeDirectories);
    if (commonNative) return commonNative;
  }

  const relativeDirectories = fileEntries
    .map(entry => getDirectoryFromPath(entry?.path || ''))
    .filter(Boolean);
  if (relativeDirectories.length > 0) {
    const commonRelative = getCommonPathPrefix(relativeDirectories);
    if (commonRelative) return commonRelative;
  }

  if (options.fromFolder) return String(options.folderName || '').trim();
  return '';
}

async function collectProgramFilesFromDirectory(dirHandle, prefix = '') {
  const entries = [];
  for await (const [, entry] of dirHandle.entries()) {
    const relativePath = prefix ? `${prefix}/${entry.name}` : entry.name;
    if (entry.kind === 'directory') {
      const nested = await collectProgramFilesFromDirectory(entry, relativePath);
      entries.push(...nested);
      continue;
    }
    const lowerName = String(entry.name || '').toLowerCase();
    if (!lowerName.endsWith('.ham') && !lowerName.endsWith('.ter')) continue;
    const file = await entry.getFile();
    entries.push({ file, handle: entry, path: relativePath });
  }
  return entries;
}

async function loadProgramFromDirectory(dirHandle) {
  loadedProgramFolderHandle = dirHandle || null;
  const files = await collectProgramFilesFromDirectory(dirHandle);
  await loadProgramFromFiles(files, { fromFolder: true, folderName: dirHandle.name || 'folder', folderHandle: dirHandle || null });
}

async function loadProgramFromFiles(files, options = {}) {
  if (Object.prototype.hasOwnProperty.call(options, 'folderHandle')) {
    loadedProgramFolderHandle = options.folderHandle || null;
  }
  const fileList = Array.from(files || []).map(item => {
    if (item && typeof item === 'object' && item.file) {
      const nativePath = typeof item.file?.path === 'string' ? item.file.path : '';
      return { file: item.file, fileHandle: item.handle || null, path: String(item.path || item.file.name || ''), nativePath };
    }
    const fallbackPath = item?.webkitRelativePath || item?.name || '';
    const nativePath = typeof item?.path === 'string' ? item.path : '';
    return { file: item, fileHandle: null, path: String(fallbackPath), nativePath };
  });

  const hamFiles = fileList.filter(entry => /\.ham$/i.test(entry.path || entry.file?.name || ''));
  if (hamFiles.length === 0) {
    throw new Error('No .ham files found');
  }

  const hamEntries = await Promise.all(hamFiles.map(async entry => ({
    ...entry,
    path: normalizeProgramPath(entry.path || entry.file?.name || ''),
    text: await entry.file.text(),
  })));
  const terEntries = await Promise.all(
    fileList
      .filter(entry => /\.ter$/i.test(entry.path || entry.file?.name || ''))
      .map(async entry => ({
        ...entry,
        path: normalizeProgramPath(entry.path || entry.file?.name || ''),
        text: await entry.file.text(),
      }))
  );

  // Prefer the traditional entrypoint names when available.
  const preferredByName = hamEntries.find(entry => /(^|[\\/])hamsterprogram(m)?\.ham$/i.test(entry.path || entry.file?.name || ''));
  const preferredByMain = hamEntries.find(entry => /\bvoid\s+main\s*\(\s*\)/.test(String(entry.text || '')));
  const entryHam = preferredByName || preferredByMain || hamEntries[0];

  loadedHamPrograms = hamEntries.map(entry => ({
    path: entry.path,
    fileHandle: entry.fileHandle || null,
    text: entry.text,
  }));
  loadedTerrainFiles = terEntries.map(entry => ({
    path: entry.path,
    fileHandle: entry.fileHandle || null,
    text: entry.text,
  }));
  selectedTerrainPath = '';
  setActiveProgramByPath(entryHam.path, { updateStatus: false });
  resetProgramText = editor.value ?? '';
  currentProgramFilename = ensureHamExtension(getFilenameFromPath(selectedProgramPath || entryHam.path) || currentProgramFilename);

  const loadedNames = [
    ...loadedHamPrograms.map(entry => entry.path),
    ...loadedTerrainFiles.map(entry => entry.path),
  ];
  loadedProgramFolder = resolveLoadedFolderPath(fileList, options);
  loadedProgramFiles = loadedNames.map(path => ({ path }));

  const baseName = getBasenameWithoutExtension(getFilenameFromPath(currentProgramFilename));
  let companionTer = fileList.find(entry => {
    const name = getFilenameFromPath(entry.path || entry.file?.name || '');
    return /\.ter$/i.test(name) && getBasenameWithoutExtension(name) === baseName;
  });
  if (!companionTer) {
    companionTer = fileList.find(entry => /\.ter$/i.test(entry.path || entry.file?.name || ''));
  }

  if (companionTer) {
    loadTerrainByPath(companionTer.path, { updateStatus: false });
    updateLoadedSourcesPanel();
    setStatus(`Loaded ${currentProgramFilename} + ${Math.max(0, loadedHamPrograms.length - 1)} companion .ham + ${getFilenameFromPath(companionTer.path)}`);
    return;
  }

  updateLoadedSourcesPanel();

  if (hamFiles.length === 1 && !options.fromFolder) {
    setStatus(`Program loaded: ${currentProgramFilename}. Select multiple .ham files from the same folder to include dependencies.`);
    return;
  }

  if (options.fromFolder) {
    setStatus(`Loaded folder ${options.folderName}: ${currentProgramFilename} + ${Math.max(0, loadedHamPrograms.length - 1)} companion .ham (no .ter file found)`);
    return;
  }

  setStatus(`Program loaded: ${currentProgramFilename} + ${Math.max(0, loadedHamPrograms.length - 1)} companion .ham (no companion .ter selected)`);
}

updateLoadedSourcesPanel();
initResizablePanes();

function downloadTextFile(filename, text) {
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

async function saveTextFile(suggestedName, text, extension) {
  const cleanName = String(suggestedName || 'file.txt').trim() || 'file.txt';
  if (typeof window.showSaveFilePicker === 'function') {
    const handle = await window.showSaveFilePicker({
      suggestedName: cleanName,
      types: [{
        description: 'Hamster file',
        accept: { 'text/plain': [extension] },
      }],
    });
    const writable = await handle.createWritable();
    await writable.write(text);
    await writable.close();
    return { saved: true, filename: handle.name || cleanName, nativeDialog: true };
  }
  downloadTextFile(cleanName, text);
  return { saved: true, filename: cleanName, nativeDialog: false };
}

function eventToCell(evt) {
  const terrain = currentState?.terrain;
  if (!terrain) return null;
  const rect = canvas.getBoundingClientRect();
  const px = (evt.clientX - rect.left) * (canvas.width / rect.width);
  const py = (evt.clientY - rect.top) * (canvas.height / rect.height);
  const cellWidth = terrain.width ? canvas.width / terrain.width : 1;
  const cellHeight = terrain.height ? canvas.height / terrain.height : 1;
  const x = Math.floor(px / cellWidth);
  const y = Math.floor(py / cellHeight);
  if (x < 0 || y < 0 || x >= terrain.width || y >= terrain.height) return null;
  return { x, y };
}

function updateHover(cell) {
  if (!hoverInfo) return;
  if (!cell || !currentState) {
    hoverInfo.textContent = 'Row –, Col –';
    return;
  }
  const { terrain } = currentState;
  const isWall = terrain.walls[cell.y][cell.x] === 1;
  const corn = terrain.corn[cell.y][cell.x];
  const hamster = terrain.hamsters.find(h => h.x === cell.x && h.y === cell.y);
  const parts = [`Row ${cell.y}`, `Col ${cell.x}`];
  parts.push(isWall ? 'Wall' : 'Free');
  if (corn > 0) parts.push(`${corn} corn`);
  if (hamster) parts.push('Hamster');
  hoverInfo.textContent = parts.join(' · ');
}

function getCornAmount() {
  const value = parseInt(cornInput?.value ?? '0', 10);
  return Number.isNaN(value) ? 0 : Math.max(0, value);
}

function applyTool(cell) {
  if (hasPendingProgram() || !currentState) return;
  let nextState = null;
  try {
    switch (currentTool) {
      case 'wall':
        if (!cell) return;
        nextState = engine.setWall(cell.x, cell.y, 1);
        break;
      case 'erase':
        if (!cell) return;
        engine.setWall(cell.x, cell.y, 0);
        nextState = engine.setCorn(cell.x, cell.y, 0);
        break;
      case 'corn':
        if (!cell) return;
        engine.setWall(cell.x, cell.y, 0);
        nextState = engine.setCorn(cell.x, cell.y, getCornAmount());
        break;
      case 'hamster':
        if (!cell) return;
        nextState = engine.setDefaultHamster(cell.x, cell.y);
        break;
      case 'rotate':
        nextState = engine.rotateDefaultHamster(1);
        break;
      default:
        break;
    }
  } catch (err) {
    setStatus(err.message || 'Edit failed');
    return;
  }
  if (nextState) {
    draw(nextState);
    lastPaintCell = cell || null;
  }
}
