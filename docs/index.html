<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hamster Simulator – TeaVM Prototype</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── header ─────────────────────────────────────────── */
    header {
      background: #181825;
      padding: .6rem 1rem;
      display: flex;
      align-items: center;
      gap: .8rem;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; color: #cba6f7; }
    header .badge {
      font-size: .7rem; background: #45475a; padding: .2rem .5rem;
      border-radius: 4px; color: #a6e3a1;
    }

    /* ── main layout ─────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: 1fr 200px;
      gap: .5rem;
      padding: .5rem;
      flex: 1;
      overflow: hidden;
    }

    /* ── simulation canvas ───────────────────────────────── */
    #sim-wrapper {
      grid-row: 1 / 2;
      grid-column: 1 / 2;
      background: #181825;
      border: 1px solid #313244;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: .5rem;
    }
    canvas { box-shadow: 0 4px 20px rgba(0,0,0,.5); border-radius: 2px; }

    /* ── editor ──────────────────────────────────────────── */
    #editor-wrapper {
      grid-row: 1 / 3;
      grid-column: 2 / 3;
      background: #181825;
      border: 1px solid #313244;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #editor-wrapper .panel-title {
      padding: .4rem .8rem;
      font-size: .8rem;
      color: #89b4fa;
      background: #1e1e2e;
      border-bottom: 1px solid #313244;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    #editor {
      flex: 1;
      font-family: 'Consolas', 'Fira Code', monospace;
      font-size: .88rem;
      background: #1e1e2e;
      color: #cdd6f4;
      border: none;
      resize: none;
      padding: .8rem;
      outline: none;
      line-height: 1.55;
    }
    #editor-controls {
      padding: .5rem .8rem;
      display: flex;
      gap: .4rem;
      border-top: 1px solid #313244;
      flex-wrap: wrap;
    }
    #sources-panel {
      border-top: 1px solid #313244;
      background: #151522;
      padding: .5rem .8rem;
      font-size: .78rem;
      max-height: 180px;
      overflow: auto;
    }
    #sources-folder {
      color: #89b4fa;
      margin-bottom: .35rem;
      word-break: break-word;
    }
    #sources-list {
      list-style: none;
      display: grid;
      gap: .2rem;
    }
    #sources-list li {
      font-family: 'Consolas', 'Fira Code', monospace;
      color: #cdd6f4;
      border-left: 2px solid #45475a;
      padding-left: .4rem;
      word-break: break-word;
    }
    #sources-list li.file-ham { border-left-color: #a6e3a1; }
    #sources-list li.file-ter { border-left-color: #f9e2af; }
    #sources-empty {
      color: #6c7086;
      font-style: italic;
    }

    /* ── log ─────────────────────────────────────────────── */
    #log-wrapper {
      grid-row: 2 / 3;
      grid-column: 1 / 2;
      background: #181825;
      border: 1px solid #313244;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: .4rem .8rem;
      font-family: monospace;
      font-size: .78rem;
      line-height: 1.5;
    }
    #log div        { color: #a6e3a1; }
    #log .log-error { color: #f38ba8; }
    #log .log-sys   { color: #89b4fa; }

    /* ── buttons ─────────────────────────────────────────── */
    button {
      padding: .35rem .75rem;
      border: 1px solid #45475a;
      border-radius: 4px;
      background: #313244;
      color: #cdd6f4;
      cursor: pointer;
      font-size: .82rem;
      transition: background .15s;
    }
    button:hover   { background: #45475a; }
    button.primary { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    button.primary:hover { background: #6d28d9; }
    button.success { background: #166534; border-color: #4ade80; color: #4ade80; }
    button.success:hover { background: #14532d; }
    button.danger  { background: #7f1d1d; border-color: #f87171; color: #f87171; }
    button:disabled { opacity: .4; cursor: default; }

    /* ── toolbar ─────────────────────────────────────────── */
    #toolbar {
      display: flex;
      gap: .4rem;
      padding: .4rem .6rem;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-wrap: wrap;
      align-items: center;
      flex-shrink: 0;
    }
    #toolbar label { font-size: .8rem; color: #6c7086; }
    .tool-group { display: flex; align-items: center; gap: .3rem; flex-wrap: wrap; }
    .tool-button {
      background: #27293b;
      border: 1px solid #3c3f55;
      padding: .3rem .6rem;
      font-size: .75rem;
    }
    .tool-button.active { background: #cba6f7; color: #1e1e2e; border-color: #cba6f7; }
    #corn-amount { width: 56px; background: #1e1e2e; color: #cdd6f4; border: 1px solid #45475a; border-radius: 4px; padding: .2rem .3rem; }
    #hover-info { font-size: .75rem; color: #a6adc8; min-width: 180px; }
    #terrain-size  { background: #1e1e2e; color: #cdd6f4; border: 1px solid #45475a;
                     padding: .2rem .4rem; border-radius: 4px; width: 50px; font-size: .82rem; }
    #speed-range   { width: 90px; accent-color: #cba6f7; }
    #status        { margin-left: auto; font-size: .78rem; color: #6c7086; }

    .panel-title { padding: .4rem .8rem; font-size: .8rem; color: #89b4fa;
                   background: #1e1e2e; border-bottom: 1px solid #313244; }

    /* ── terminal input overlay ──────────────────────────── */
    #terminal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #terminal-overlay.visible { display: flex; }
    #terminal-box {
      background: #181825;
      border: 1px solid #cba6f7;
      border-radius: 8px;
      padding: 1.5rem;
      width: 380px;
    }
    #terminal-prompt { margin-bottom: .6rem; color: #f9e2af; font-size: .9rem; }
    #terminal-input  { width: 100%; background: #1e1e2e; color: #cdd6f4;
                       border: 1px solid #45475a; border-radius: 4px;
                       padding: .4rem; font-family: monospace; }
  </style>
</head>
<body>

<header>
  <h1>🐹 Hamster Simulator</h1>
  <span class="badge">TeaVM Prototype</span>
  <span id="loading-msg" style="font-size:.8rem;color:#f38ba8">Loading engine…</span>
</header>

<div id="toolbar">
  <label>W <input id="ter-w" type="number" class="terrain-size" value="10" min="1" max="30" style="width:50px;background:#1e1e2e;color:#cdd6f4;border:1px solid #45475a;padding:.2rem .4rem;border-radius:4px;font-size:.82rem;"></label>
  <label>H <input id="ter-h" type="number" class="terrain-size" value="8"  min="1" max="20" style="width:50px;background:#1e1e2e;color:#cdd6f4;border:1px solid #45475a;padding:.2rem .4rem;border-radius:4px;font-size:.82rem;"></label>
  <button id="btn-new">New Terrain</button>
  <button id="btn-load-sample">Load Sample</button>
  <button id="btn-import-terrain">Import .ter</button>
  <button id="btn-export-terrain">Export .ter</button>
  <label style="margin-left:.5rem">Speed <input id="speed-range" type="range" min="50" max="1000" value="400" step="50"></label>
  <div class="tool-group" style="margin-left:.5rem">
    <span style="font-size:.75rem;color:#6c7086;margin-right:.2rem">Edit</span>
    <button class="tool-button active" data-tool="wall">Wall</button>
    <button class="tool-button" data-tool="erase">Erase</button>
    <button class="tool-button" data-tool="corn">Corn</button>
    <button class="tool-button" data-tool="hamster">Move</button>
    <button class="tool-button" data-tool="rotate">Rotate</button>
    <label style="font-size:.75rem;color:#6c7086;display:flex;align-items:center;gap:.2rem">Corn
      <input id="corn-amount" type="number" min="0" value="1">
    </label>
    <span id="hover-info">Row –, Col –</span>
  </div>
  <span id="status">Ready</span>
</div>

<input id="terrain-file-input" type="file" accept=".ter,text/plain" style="display:none" />
<input id="program-file-input" type="file" accept=".ham,.ter,.txt,text/plain" multiple style="display:none" />

<main>
  <section id="sim-wrapper">
    <canvas id="sim-canvas"></canvas>
  </section>

  <section id="editor-wrapper">
    <div class="panel-title">
      📝 Program
      <span style="font-size:.72rem;color:#6c7086;margin-left:auto">
        Available: vor() linksUm() nimm() gib() vornFrei() kornDa() maulLeer() readInt() readString()
      </span>
    </div>
    <textarea id="editor" spellcheck="false">// Example hamster program in classic .ham syntax
void main() {
  while (vornFrei()) {
    if (kornDa()) {
      nimm();
    }
    vor();
  }
  linksUm();
  linksUm();
}</textarea>
    <div id="editor-controls">
      <button id="btn-run"  class="primary success">▶ Run</button>
      <button id="btn-step" class="primary">⏭ Step</button>
      <button id="btn-stop" class="danger" disabled>⏹ Stop</button>
      <button id="btn-reset">↺ Reset</button>
      <button id="btn-import-program">Load .ham</button>
      <button id="btn-load-folder">Load Folder</button>
      <button id="btn-export-program">Save .ham</button>
      <button id="btn-save-plus">Save+ (.ham + .ter)</button>
    </div>
    <div id="sources-panel" aria-live="polite">
      <div id="sources-folder">Folder: none</div>
      <ul id="sources-list"></ul>
      <div id="sources-empty">No source files loaded yet.</div>
    </div>
  </section>

  <section id="log-wrapper">
    <div class="panel-title">📋 Execution Log</div>
    <div id="log"></div>
  </section>
</main>

<!-- Terminal input overlay (shown when a program calls readInt/readString) -->
<div id="terminal-overlay">
  <div id="terminal-box">
    <div id="terminal-prompt"></div>
    <input id="terminal-input" type="text" placeholder="Type your answer…" />
    <div style="margin-top:.8rem;display:flex;gap:.5rem;justify-content:flex-end">
      <button id="terminal-submit" class="primary">Submit</button>
    </div>
  </div>
</div>

<script type="module">
/*
 * IMPORTANT: This script block runs after TeaVM has compiled the Java engine.
 * During development without a build, replace the import path with your
 * TeaVM output file.  After `mvn package` the engine lands in:
 *   target/<artifact>/js/hamster-engine.js
 *
 * For local file testing (no server), use the CheerpJ alternative page instead.
 */
import {
  engine,
  initCanvas, render,
  initLog, appendLog, clearLog,
  compileProgram, stepProgram, runProgram, stopProgram,
  setStepCallback, hasPendingProgram, terrainToTer
} from './hamster-ui.js';

// ─── DOM refs ────────────────────────────────────────────────
const canvas       = document.getElementById('sim-canvas');
const logEl        = document.getElementById('log');
const statusEl     = document.getElementById('status');
const loadingMsg   = document.getElementById('loading-msg');
const editor       = document.getElementById('editor');
const overlay      = document.getElementById('terminal-overlay');
const termPrompt   = document.getElementById('terminal-prompt');
const termInput    = document.getElementById('terminal-input');
const termSubmit   = document.getElementById('terminal-submit');

const btnNew       = document.getElementById('btn-new');
const btnSample    = document.getElementById('btn-load-sample');
const btnImport    = document.getElementById('btn-import-terrain');
const btnExport    = document.getElementById('btn-export-terrain');
const btnRun       = document.getElementById('btn-run');
const btnStep      = document.getElementById('btn-step');
const btnStop      = document.getElementById('btn-stop');
const btnReset     = document.getElementById('btn-reset');
const btnImportProgram = document.getElementById('btn-import-program');
const btnLoadFolder = document.getElementById('btn-load-folder');
const btnExportProgram = document.getElementById('btn-export-program');
const btnSavePlus  = document.getElementById('btn-save-plus');
const speedRange   = document.getElementById('speed-range');
const terW         = document.getElementById('ter-w');
const terH         = document.getElementById('ter-h');
const toolButtons  = document.querySelectorAll('[data-tool]');
const cornInput    = document.getElementById('corn-amount');
const hoverInfo    = document.getElementById('hover-info');
const terrainFileInput = document.getElementById('terrain-file-input');
const programFileInput = document.getElementById('program-file-input');
const sourcesFolderEl = document.getElementById('sources-folder');
const sourcesListEl = document.getElementById('sources-list');
const sourcesEmptyEl = document.getElementById('sources-empty');

let currentState   = null;
let currentTool    = 'wall';
let isDragging     = false;
let lastPaintCell  = null;
let currentProgramFilename = 'program.ham';
let loadedProgramFolder = '';
let loadedProgramFiles = [];
let resetProgramText = '';
let activeTerminalPrompt = null;

// ─── init canvas / log ───────────────────────────────────────
initCanvas(canvas);
initLog(logEl);

const draw = state => {
  if (!state) return;
  currentState = state;
  render(state);
};

// ─── step callback: rerender after every engine step ─────────
setStepCallback(state => {
  draw(state);
    appendLog(state.log.slice(-5));   // show last 5 log entries
    checkTerminal(state);
    setStatus(state.state === 2 ? 'Finished' : 'Running');
});

// ─── terminal overlay ────────────────────────────────────────
function checkTerminal(state) {
  if (!state?.terminal?.needsInput) {
    activeTerminalPrompt = null;
    overlay.classList.remove('visible');
    return;
  }

  const prompt = state.terminal.prompt || 'Input required:';
  const isNewPrompt = prompt !== activeTerminalPrompt;

  if (isNewPrompt || !overlay.classList.contains('visible')) {
    termPrompt.textContent = prompt;
    termInput.value = '';
    activeTerminalPrompt = prompt;
    overlay.classList.add('visible');
    termInput.focus();
  }
}

termSubmit.addEventListener('click', () => {
    engine.provideInput(termInput.value);
  activeTerminalPrompt = null;
    overlay.classList.remove('visible');
});
termInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') termSubmit.click();
});

// ─── engine boot (triggered after module loads) ───────────────
try {
    const initState = engine.init(
        parseInt(terW.value, 10),
        parseInt(terH.value, 10)
    );
    draw(initState);
    loadingMsg.style.display = 'none';
    setStatus('Ready');
    resetProgramText = editor.value ?? '';
} catch(e) {
    loadingMsg.textContent = 'Engine failed to load – see console';
    console.error(e);
}

// ─── terrain controls ─────────────────────────────────────────
btnNew.addEventListener('click', () => {
    const w = parseInt(terW.value, 10);
    const h = parseInt(terH.value, 10);
    if (isNaN(w) || isNaN(h) || w < 1 || h < 1) return;
    const state = engine.init(w, h);
    draw(state);
    clearLog();
    setStatus('New terrain ' + w + '×' + h);
});

btnSample.addEventListener('click', () => {
    // A small pre-built terrain: 8×5 with a wall corridor and some corn
    const ter = [
        '8',      // width
        '5',      // height
        // grid  (# = wall, spaces = empty, > = default hamster East)
        '#      #',
        '# *  * #',
        '#>     #',
        '# *  * #',
        '#      #',
        // corn counts (4 grain cells, each has 2 grains)
        '2','2','2','2',
        // default hamster mouth count
        '0'
    ].join('\n');

    const state = engine.loadTerrain(ter);
  draw(state);
    clearLog();
    setStatus('Sample terrain loaded');
});

  // ─── terrain file workflow ─────────────────────────────────────────
  btnImport?.addEventListener('click', () => terrainFileInput?.click());

  terrainFileInput?.addEventListener('change', async event => {
    const input = event.target;
    const file = input.files?.[0];
    if (!file) return;
    try {
      const text = await file.text();
      const state = engine.loadTerrain(text);
      draw(state);
      clearLog();
      setStatus(`Loaded ${file.name}`);
    } catch (err) {
      console.error(err);
      setStatus(err.message || 'Invalid .ter file');
    } finally {
      input.value = '';
    }
  });

  btnExport?.addEventListener('click', async () => {
    if (!currentState?.terrain) {
      setStatus('Nothing to export');
      return;
    }
    try {
      const terText = terrainToTer(currentState);
      const w = currentState.terrain.width;
      const h = currentState.terrain.height;
      const filename = `terrain-${w}x${h}.ter`;
      const result = await saveTextFile(filename, terText, '.ter');
      if (result.saved) {
        setStatus(`Terrain saved: ${result.filename}`);
      }
    } catch (err) {
      if (err?.name === 'AbortError') {
        setStatus('Save cancelled');
        return;
      }
      console.error(err);
      setStatus(err.message || 'Export failed');
    }
  });

// ─── program file workflow ─────────────────────────────────────────
btnImportProgram?.addEventListener('click', () => programFileInput?.click());

btnLoadFolder?.addEventListener('click', async () => {
  if (typeof window.showDirectoryPicker !== 'function') {
    setStatus('Load Folder not supported in this browser. Use Load .ham and select all files.');
    return;
  }
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'read' });
    await loadProgramFromDirectory(dirHandle);
  } catch (err) {
    if (err?.name === 'AbortError') {
      setStatus('Folder selection cancelled');
      return;
    }
    console.error(err);
    setStatus(err.message || 'Could not load folder');
  }
});

programFileInput?.addEventListener('change', async event => {
  const input = event.target;
  const files = Array.from(input.files || []);
  if (files.length === 0) return;
  try {
    await loadProgramFromFiles(files);
  } catch (err) {
    console.error(err);
    setStatus(err.message || 'Could not load program file');
  } finally {
    input.value = '';
  }
});

btnExportProgram?.addEventListener('click', async () => {
  const suggested = ensureHamExtension(currentProgramFilename || 'program.ham');
  try {
    const result = await saveTextFile(suggested, editor.value ?? '', '.ham');
    if (!result.saved) return;
    currentProgramFilename = ensureHamExtension(result.filename || suggested);
    setStatus(`Program saved: ${currentProgramFilename}`);
  } catch (err) {
    if (err?.name === 'AbortError') {
      setStatus('Save cancelled');
      return;
    }
    console.error(err);
    setStatus(err.message || 'Save failed');
  }
});

btnSavePlus?.addEventListener('click', async () => {
  if (!currentState?.terrain) {
    setStatus('No terrain to save');
    return;
  }
  const defaultBase = getBasenameWithoutExtension(currentProgramFilename || 'program') || 'program';
  const base = defaultBase;
  const hamName = ensureHamExtension(base);
  const terName = ensureTerExtension(base);

  try {
    const hamResult = await saveTextFile(hamName, editor.value ?? '', '.ham');
    if (!hamResult.saved) return;
    const savedHamName = ensureHamExtension(hamResult.filename || hamName);
    const terFromHamName = ensureTerExtension(getBasenameWithoutExtension(savedHamName));
    const terResult = await saveTextFile(terFromHamName, terrainToTer(currentState), '.ter');
    if (!terResult.saved) return;
    currentProgramFilename = savedHamName;
    setStatus(`Saved ${savedHamName} + ${terResult.filename}`);
  } catch (err) {
    if (err?.name === 'AbortError') {
      setStatus('Save cancelled');
      return;
    }
    console.error(err);
    setStatus(err.message || 'Save+ failed');
  }
});

// ─── program controls ─────────────────────────────────────────
btnRun.addEventListener('click', () => {
    clearLog();
    engine.start();
  resetProgramText = editor.value ?? '';

    // Compile the editor content
    const n = compileProgram(editor.value);
    if (n === 0) { setStatus('No statements to run'); return; }

    setStatus('Running…');
    btnRun.disabled  = true;
    btnStep.disabled = true;
    btnStop.disabled = false;

    runProgram(parseInt(speedRange.value, 10));

    // Re-enable controls when done
    const timer = setInterval(() => {
      if (!hasPendingProgram()) {
            clearInterval(timer);
            btnRun.disabled  = false;
            btnStep.disabled = false;
            btnStop.disabled = true;
            setStatus('Finished');
        }
    }, 200);
});

btnStep.addEventListener('click', () => {
    // First click: compile the script and snapshot the terrain
  if (!hasPendingProgram()) {
        engine.start();
        resetProgramText = editor.value ?? '';
        compileProgram(editor.value);
        clearLog();
    }
    const hasMore = stepProgram();
    if (!hasMore) {
        setStatus('Program complete');
        btnStop.disabled = true;
        btnRun.disabled  = false;
    } else {
        btnStop.disabled = false;
        btnRun.disabled  = true;
    }
});

btnStop.addEventListener('click', () => {
    stopProgram();
    btnRun.disabled  = false;
    btnStep.disabled = false;
    btnStop.disabled = true;
    setStatus('Stopped');
});

btnReset.addEventListener('click', () => {
    stopProgram();
    const state = engine.reset();
    if (typeof resetProgramText === 'string' && resetProgramText.length > 0) {
      editor.value = resetProgramText;
    }
    overlay.classList.remove('visible');
    termInput.value = '';
  draw(state);
    clearLog();
    btnRun.disabled  = false;
    btnStep.disabled = false;
    btnStop.disabled = true;
    setStatus('Reset');
});

// ─── terrain editing ───────────────────────────────────────
toolButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    currentTool = btn.dataset.tool;
    toolButtons.forEach(b => b.classList.toggle('active', b === btn));
  });
});

canvas.addEventListener('mousedown', evt => {
  const cell = eventToCell(evt);
  if (currentTool !== 'rotate' && !cell) return;
  isDragging = true;
  lastPaintCell = null;
  applyTool(cell);
});

canvas.addEventListener('mousemove', evt => {
  const cell = eventToCell(evt);
  updateHover(cell);
  if (!isDragging) return;
  if (currentTool !== 'rotate' && cell && lastPaintCell && lastPaintCell.x === cell.x && lastPaintCell.y === cell.y) {
    return;
  }
  applyTool(cell);
});

canvas.addEventListener('mouseleave', () => {
  updateHover(null);
  isDragging = false;
  lastPaintCell = null;
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  lastPaintCell = null;
});

// ─── helpers ──────────────────────────────────────────────────
function setStatus(msg) {
    statusEl.textContent = msg;
}

function updateLoadedSourcesPanel() {
  if (sourcesFolderEl) {
    sourcesFolderEl.textContent = `Folder: ${loadedProgramFolder || 'none'}`;
  }
  if (!sourcesListEl || !sourcesEmptyEl) return;

  sourcesListEl.innerHTML = '';
  const files = Array.isArray(loadedProgramFiles) ? loadedProgramFiles : [];
  for (const fileName of files) {
    const li = document.createElement('li');
    li.textContent = fileName;
    if (/\.ham$/i.test(fileName)) li.classList.add('file-ham');
    if (/\.ter$/i.test(fileName)) li.classList.add('file-ter');
    sourcesListEl.appendChild(li);
  }
  sourcesEmptyEl.style.display = files.length === 0 ? 'block' : 'none';
}

function ensureHamExtension(name) {
  const base = String(name || '').trim() || 'program';
  return /\.ham$/i.test(base) ? base : `${base}.ham`;
}

function ensureTerExtension(name) {
  const base = String(name || '').trim() || 'terrain';
  return /\.ter$/i.test(base) ? base : `${base}.ter`;
}

function getBasenameWithoutExtension(name) {
  const value = String(name || '').trim();
  return value.replace(/\.[^.]+$/u, '');
}

async function loadProgramFromDirectory(dirHandle) {
  const files = [];
  for await (const [, entry] of dirHandle.entries()) {
    if (entry.kind !== 'file') continue;
    const lowerName = String(entry.name || '').toLowerCase();
    if (!lowerName.endsWith('.ham') && !lowerName.endsWith('.ter')) continue;
    const file = await entry.getFile();
    files.push(file);
  }
  await loadProgramFromFiles(files, { fromFolder: true, folderName: dirHandle.name || 'folder' });
}

async function loadProgramFromFiles(files, options = {}) {
  const fileList = Array.from(files || []);
  const hamFiles = fileList.filter(file => /\.ham$/i.test(file.name));
  if (hamFiles.length === 0) {
    throw new Error('No .ham files found');
  }

  // Prefer the traditional entrypoint name when available.
  const entryHam = hamFiles.find(file => /(^|[\\/])hamsterprogramm\.ham$/i.test(file.name)) || hamFiles[0];
  const companionHams = hamFiles.filter(file => file !== entryHam);

  const entryText = await entryHam.text();
  const companionTexts = await Promise.all(companionHams.map(async file => {
    const text = await file.text();
    return `\n/* companion file: ${file.name} */\n${text}`;
  }));

  editor.value = `${entryText}${companionTexts.join('')}`;
  resetProgramText = editor.value ?? '';
  currentProgramFilename = ensureHamExtension(entryHam.name || currentProgramFilename);

  const loadedNames = [entryHam.name, ...companionHams.map(file => file.name)];
  loadedProgramFolder = options.fromFolder ? (options.folderName || '') : '';
  loadedProgramFiles = [...loadedNames];

  const baseName = getBasenameWithoutExtension(currentProgramFilename);
  let companionTer = fileList.find(file => /\.ter$/i.test(file.name) && getBasenameWithoutExtension(file.name) === baseName);
  if (!companionTer) {
    companionTer = fileList.find(file => /\.ter$/i.test(file.name));
  }

  if (companionTer) {
    const terrainText = await companionTer.text();
    const state = engine.loadTerrain(terrainText);
    draw(state);
    clearLog();
    loadedProgramFiles.push(companionTer.name);
    updateLoadedSourcesPanel();
    setStatus(`Loaded ${currentProgramFilename} + ${companionHams.length} companion .ham + ${companionTer.name}`);
    return;
  }

  updateLoadedSourcesPanel();

  if (hamFiles.length === 1 && !options.fromFolder) {
    setStatus(`Program loaded: ${currentProgramFilename}. Select multiple .ham files from the same folder to include dependencies.`);
    return;
  }

  if (options.fromFolder) {
    setStatus(`Loaded folder ${options.folderName}: ${currentProgramFilename} + ${companionHams.length} companion .ham (no .ter file found)`);
    return;
  }

  setStatus(`Program loaded: ${currentProgramFilename} + ${companionHams.length} companion .ham (no companion .ter selected)`);
}

updateLoadedSourcesPanel();

function downloadTextFile(filename, text) {
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

async function saveTextFile(suggestedName, text, extension) {
  const cleanName = String(suggestedName || 'file.txt').trim() || 'file.txt';
  if (typeof window.showSaveFilePicker === 'function') {
    const handle = await window.showSaveFilePicker({
      suggestedName: cleanName,
      types: [{
        description: 'Hamster file',
        accept: { 'text/plain': [extension] },
      }],
    });
    const writable = await handle.createWritable();
    await writable.write(text);
    await writable.close();
    return { saved: true, filename: handle.name || cleanName, nativeDialog: true };
  }
  downloadTextFile(cleanName, text);
  return { saved: true, filename: cleanName, nativeDialog: false };
}

function eventToCell(evt) {
  const terrain = currentState?.terrain;
  if (!terrain) return null;
  const rect = canvas.getBoundingClientRect();
  const px = (evt.clientX - rect.left) * (canvas.width / rect.width);
  const py = (evt.clientY - rect.top) * (canvas.height / rect.height);
  const cellWidth = terrain.width ? canvas.width / terrain.width : 1;
  const cellHeight = terrain.height ? canvas.height / terrain.height : 1;
  const x = Math.floor(px / cellWidth);
  const y = Math.floor(py / cellHeight);
  if (x < 0 || y < 0 || x >= terrain.width || y >= terrain.height) return null;
  return { x, y };
}

function updateHover(cell) {
  if (!hoverInfo) return;
  if (!cell || !currentState) {
    hoverInfo.textContent = 'Row –, Col –';
    return;
  }
  const { terrain } = currentState;
  const isWall = terrain.walls[cell.y][cell.x] === 1;
  const corn = terrain.corn[cell.y][cell.x];
  const hamster = terrain.hamsters.find(h => h.x === cell.x && h.y === cell.y);
  const parts = [`Row ${cell.y}`, `Col ${cell.x}`];
  parts.push(isWall ? 'Wall' : 'Free');
  if (corn > 0) parts.push(`${corn} corn`);
  if (hamster) parts.push('Hamster');
  hoverInfo.textContent = parts.join(' · ');
}

function getCornAmount() {
  const value = parseInt(cornInput?.value ?? '0', 10);
  return Number.isNaN(value) ? 0 : Math.max(0, value);
}

function applyTool(cell) {
  if (hasPendingProgram() || !currentState) return;
  let nextState = null;
  try {
    switch (currentTool) {
      case 'wall':
        if (!cell) return;
        nextState = engine.setWall(cell.x, cell.y, 1);
        break;
      case 'erase':
        if (!cell) return;
        engine.setWall(cell.x, cell.y, 0);
        nextState = engine.setCorn(cell.x, cell.y, 0);
        break;
      case 'corn':
        if (!cell) return;
        engine.setWall(cell.x, cell.y, 0);
        nextState = engine.setCorn(cell.x, cell.y, getCornAmount());
        break;
      case 'hamster':
        if (!cell) return;
        nextState = engine.setDefaultHamster(cell.x, cell.y);
        break;
      case 'rotate':
        nextState = engine.rotateDefaultHamster(1);
        break;
      default:
        break;
    }
  } catch (err) {
    setStatus(err.message || 'Edit failed');
    return;
  }
  if (nextState) {
    draw(nextState);
    lastPaintCell = cell || null;
  }
}
